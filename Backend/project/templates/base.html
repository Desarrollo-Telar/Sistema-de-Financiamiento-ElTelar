{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVERSIONES INTEGRALES EL TELAR S.A | {{title}}</title>
  <link rel="icon" href="{% static 'img/logo.png' %}" />

  <!-- Bootstrap-->

  <!--<link rel="stylesheet" href="{% static 'css/style.css'%}" /> -->

  <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/buttons.css' %}">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <link rel="stylesheet" href="{% static 'css/list.css' %}">
  <!-- PARA AGREGAR FONTS -->




  {% block css %}
  {% endblock%}
  <style type="text/css">
    @font-face {
      font-family: 'Quicksand';
      src: url("{% static 'css/text/Quicksand/Quicksand-VariableFont_wght.ttf' %}") format('truetype'),
      url("{% static 'css/text/Quicksand/static/Quicksand-Regular.ttf' %}") format('truetype');
      font-weight: 500;
      /* Peso normal */
      font-style: normal;
      /* Estilo normal */
    }

    body {
      background-color: #ffffff;
      font-family: "Quicksand", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-container {
      flex: 1;
      display: flex;
    }
    .sidebar {
      width: 250px;
      background-color: #ffffff;
      color: #464646;
      box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.1);
    }
    
    .sidebar a {
      color: #464646;
      text-decoration: none;
      display: block;
      padding: 10px 20px;
    }
    .sidebar a:hover {
      background-color: #495057;
      color:#ffffff;
    }
    .content {
      flex-grow: 1;
      padding: 20px;
    }

    .list_sidebar a{
      color: #464646;
      text-decoration: none;

    }

    .list_sidebar a:hover {
      background-color: #495057;
      color:#ffffff;
    }

  </style>
</head>

<body>

  {% include 'navbar.html' %}

  <div class="main-container">
    {% include 'sidebar.html' %}
    <main class="content ">
      <div class="container">
        {% block content %}
        {% endblock %}
      </div>

    </main>
    

  </div>





  </main>

  <!--Bootstrap-->


  <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <!-- Incluye Axios en tu archivo HTML desde una CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="{% static 'js/node_modules/sweetalert2/dist/sweetalert2.all.min.js' %}"></script>
  <script src="{% static 'js/node_modules/chart.js/dist/chart.umd.js' %}"></script>
  <script src="{% static 'js/node_modules/axios/dist/axios.min.js' %}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    {% if messages %}
    {% for message in messages %}
    Swal.fire({
      icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
      title: "{{ message }}",
      timer: 3000,
      showConfirmButton: false,
    });
    {% endfor %}
    {% endif %}
  </script>


  {%block js%} {%endblock%}
</body>

</html>
